<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    Husu Habits — Adaptive Icon FOREGROUND (panda only, transparent bg).
    Para Android adaptive icons: el fondo es color sólido (clay) y este SVG
    aporta el panda. El panda está escalado a ~65% del canvas para caber
    cómodo en el safe zone (66dp dentro de 108dp = 61% interior).
    Paleta: panda body #C9784A, panda dark #A8633F, mask #7A4A2E, ink #2A2823.
  -->

  <!-- Panda escalado y centrado en el safe zone -->
  <g transform="translate(512, 540) scale(0.66) translate(0, -30)">
    <!-- Orejas exteriores -->
    <ellipse cx="-230" cy="-180" rx="90" ry="100" fill="#A8633F" transform="rotate(-25 -230 -180)"/>
    <ellipse cx="230" cy="-180" rx="90" ry="100" fill="#A8633F" transform="rotate(25 230 -180)"/>
    <!-- Orejas interiores cream -->
    <ellipse cx="-230" cy="-170" rx="40" ry="55" fill="#F5EFE6" transform="rotate(-25 -230 -170)"/>
    <ellipse cx="230" cy="-170" rx="40" ry="55" fill="#F5EFE6" transform="rotate(25 230 -170)"/>

    <!-- Cabeza -->
    <ellipse cx="0" cy="0" rx="270" ry="240" fill="#C9784A"/>

    <!-- Cara cream (parte central) -->
    <ellipse cx="0" cy="40" rx="180" ry="180" fill="#F5EFE6"/>

    <!-- Antifaz (típico del panda rojo: marcas oscuras alrededor de los ojos) -->
    <path d="M -120 -50 Q -180 -10 -150 60 Q -110 90 -80 60 Q -60 30 -80 -20 Q -100 -55 -120 -50 Z"
          fill="#7A4A2E"/>
    <path d="M 120 -50 Q 180 -10 150 60 Q 110 90 80 60 Q 60 30 80 -20 Q 100 -55 120 -50 Z"
          fill="#7A4A2E"/>

    <!-- Ojos (negros con highlight) -->
    <circle cx="-95" cy="20" r="22" fill="#2A2823"/>
    <circle cx="95" cy="20" r="22" fill="#2A2823"/>
    <circle cx="-88" cy="13" r="7" fill="#F5EFE6"/>
    <circle cx="102" cy="13" r="7" fill="#F5EFE6"/>

    <!-- Nariz -->
    <ellipse cx="0" cy="85" rx="22" ry="18" fill="#2A2823"/>

    <!-- Boca sutil -->
    <path d="M 0 105 Q 0 130 -15 135 M 0 105 Q 0 130 15 135"
          fill="none" stroke="#2A2823" stroke-width="6" stroke-linecap="round"/>

    <!-- Mejillas (toque cálido) -->
    <circle cx="-150" cy="80" r="20" fill="#E5A04C" opacity="0.45"/>
    <circle cx="150" cy="80" r="20" fill="#E5A04C" opacity="0.45"/>
  </g>
</svg>
