<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    Husu Habits — iOS App Icon (cuadrado, SIN border-radius).
    iOS rechaza PNGs con transparencia en App Icon (las esquinas no pueden
    ser transparentes). iOS aplica su propia máscara (squircle) sobre el
    icono al renderizar. Por eso este SVG es identico a app-icon.svg pero
    sin rx/ry en el rect de fondo: cuadrado 100% opaco.
    Paleta oficial: clay #C97B5A, cream #F5EFE6, ink #2A2823, ember #E5A04C.
  -->

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C97B5A"/>
      <stop offset="100%" stop-color="#E5A04C"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#F5EFE6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#F5EFE6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Cuadrado FULL sin bordes redondeados (iOS no acepta transparencia) -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#glow)"/>

  <!-- Mascota panda rojo simplificada (Husu) -->
  <g transform="translate(512, 540)">
    <ellipse cx="-230" cy="-180" rx="90" ry="100" fill="#A8633F" transform="rotate(-25 -230 -180)"/>
    <ellipse cx="230" cy="-180" rx="90" ry="100" fill="#A8633F" transform="rotate(25 230 -180)"/>
    <ellipse cx="-230" cy="-170" rx="40" ry="55" fill="#F5EFE6" transform="rotate(-25 -230 -170)"/>
    <ellipse cx="230" cy="-170" rx="40" ry="55" fill="#F5EFE6" transform="rotate(25 230 -170)"/>

    <ellipse cx="0" cy="0" rx="270" ry="240" fill="#C9784A"/>
    <ellipse cx="0" cy="40" rx="180" ry="180" fill="#F5EFE6"/>

    <path d="M -120 -50 Q -180 -10 -150 60 Q -110 90 -80 60 Q -60 30 -80 -20 Q -100 -55 -120 -50 Z"
          fill="#7A4A2E"/>
    <path d="M 120 -50 Q 180 -10 150 60 Q 110 90 80 60 Q 60 30 80 -20 Q 100 -55 120 -50 Z"
          fill="#7A4A2E"/>

    <circle cx="-95" cy="20" r="22" fill="#2A2823"/>
    <circle cx="95" cy="20" r="22" fill="#2A2823"/>
    <circle cx="-88" cy="13" r="7" fill="#F5EFE6"/>
    <circle cx="102" cy="13" r="7" fill="#F5EFE6"/>

    <ellipse cx="0" cy="85" rx="22" ry="18" fill="#2A2823"/>

    <path d="M 0 105 Q 0 130 -15 135 M 0 105 Q 0 130 15 135"
          fill="none" stroke="#2A2823" stroke-width="6" stroke-linecap="round"/>

    <circle cx="-150" cy="80" r="20" fill="#E5A04C" opacity="0.45"/>
    <circle cx="150" cy="80" r="20" fill="#E5A04C" opacity="0.45"/>
  </g>
</svg>
